# --- Fonts ---
font_family      Fira Code
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window Layout & Style ---
window_padding_width 12
background_opacity   0.65
dynamic_background_opacity yes

# --- Color Scheme (Subtle Black / Dark Charcoal) ---
background #121214
foreground #e3e6eb

# Black
color0 #1a1b20
color8 #454750

# Red
color1 #ff6b6b
color9 #ff6b6b

# Green
color2 #50fa7b
color10 #50fa7b

# Yellow
color3 #f1fa8c
color11 #f1fa8c

# Blue
color4 #00bcd4
color12 #00bcd4

# Magenta
color5 #ff79c6
color13 #ff79c6

# Cyan
color6 #8be9fd
color14 #8be9fd

# White
color7 #bfbfbf
color15 #ffffff

# --- Cursor & Mouse ---
cursor #00bcd4
cursor_text_color #121214
cursor_shape block
cursor_blink_interval 0

# --- Tab Bar Style ---
tab_bar_style powerline
active_tab_foreground   #121214
active_tab_background   #00bcd4
inactive_tab_foreground #e3e6eb
inactive_tab_background #1a1b20
